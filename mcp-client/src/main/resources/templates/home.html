<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skala Chat</title>
    <link rel="stylesheet" href="/css/home.css" />
</head>
<body>
<div class="app-shell">
    <header class="chat-header">
        <div>
            <h1>Skala Chat</h1>
            <p>실시간 채팅 스타일 인터페이스</p>
        </div>
        <button id="clear-chat" type="button">새 대화</button>
    </header>

    <main id="chat-area" class="chat-area">
        <section id="messages" class="messages"></section>
    </main>

    <section class="composer-wrap">
        <div id="attachments" class="attachments" aria-live="polite"></div>
        <form id="chat-form" class="composer" novalidate>
            <label for="message" class="sr-only">메시지 입력</label>
            <textarea id="message" name="message" rows="2" placeholder="메시지를 입력하세요" autocomplete="off"></textarea>
            <div id="drop-zone" class="drop-zone">
                <input id="files" name="fileList" type="file" multiple />
                <div class="drop-zone-text">파일을 여기로 드래그하거나 클릭해서 추가</div>
            </div>
            <div class="composer-actions">
                <button type="submit" id="send-btn">전송</button>
            </div>
        </form>
    </section>
</div>

<script src="/js/home.js"></script>
</body>
</html>
