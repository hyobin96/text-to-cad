spring:
  application:
    name: mcp-client

  datasource:
    url: ${JDBC_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

  ai:
    openai:
      api-key: ${OPEN_AI_KEY}
      embedding:
        options:
          model: text-embedding-3-small
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.7
          max-tokens: 2000

    vectorstore:
      pgvector:
        initialize-schema: true
        schema-name: public
        table-name: chat_memory_store
    mcp:
      client:
        streamable-http:
          connections:
            server1:
              url: ${MCP_SERVER_URL:http://localhost:8081}

  servlet:
    multipart:
      enabled: true
      max-file-size: ${MAX_FILE_SIZE:20MB}
      max-request-size: ${MAX_REQUEST_SIZE:20MB}

server:
  port: ${MCP_CLIENT_CONTAINER:8080}

app:
  upload-dir: ${APP_UPLOAD_DIR:/app/uploads}

logging:
  level:
    "[org.springframework.ai]": DEBUG

